<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 Base64 변환기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .desc {
      margin-bottom: 20px;
      color: #555;
      line-height: 1.6;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input[type="file"] {
      flex: 1 1 320px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .path-box,
    textarea {
      width: 100%;
      border: 1px solid #d0d7e2;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      background: #fff;
    }

    .path-box {
      min-height: 44px;
      margin-bottom: 12px;
      color: #444;
      word-break: break-all;
    }

    textarea {
      min-height: 320px;
      resize: vertical;
      font-family: Consolas, monospace;
    }

    .message {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>이미지 Base64 변환기</h1>
    <p class="desc">
      이미지를 선택한 뒤 <strong>Base64 변환</strong> 버튼을 누르면
      HTML에서 바로 쓸 수 있는 base64(data URL) 문자열을 아래 textarea에 넣어줍니다.
    </p>

    <div class="row">
      <input type="file" id="imageFile" accept="image/*">
      <button id="convertButton" type="button">Base64 변환</button>
      <button id="copyButton" type="button">클립보드 복사</button>
    </div>

    <div id="filePath" class="path-box">선택된 파일 없음</div>
    <textarea id="resultText" placeholder="변환 결과가 여기에 표시됩니다."></textarea>
    <div id="message" class="message"></div>
  </div>

  <script>
    (function () {
      var imageFileInput = document.getElementById('imageFile');
      var convertButton = document.getElementById('convertButton');
      var copyButton = document.getElementById('copyButton');
      var filePath = document.getElementById('filePath');
      var resultText = document.getElementById('resultText');
      var message = document.getElementById('message');

      imageFileInput.addEventListener('change', function () {
        if (imageFileInput.files && imageFileInput.files[0]) {
          filePath.textContent = imageFileInput.files[0].name;
          message.textContent = '';
        } else {
          filePath.textContent = '선택된 파일 없음';
        }
      });

      convertButton.addEventListener('click', function () {
        var file = imageFileInput.files && imageFileInput.files[0];

        if (!file) {
          alert('이미지 파일을 먼저 선택하세요.');
          return;
        }

        var reader = new FileReader();

        reader.onload = function (event) {
          resultText.value = event.target.result;
          message.textContent = '변환 완료';
        };

        reader.onerror = function () {
          message.textContent = '파일 변환 중 오류가 발생했습니다.';
        };

        reader.readAsDataURL(file);
      });

      copyButton.addEventListener('click', function () {
        var value = resultText.value.trim();

        if (!value) {
          alert('복사할 변환 결과가 없습니다.');
          return;
        }

        function fallbackCopy() {
          resultText.focus();
          resultText.select();

          var ok = document.execCommand('copy');
          message.textContent = ok
            ? '클립보드에 복사되었습니다.'
            : '복사 실패 - 직접 Ctrl+C로 복사하세요.';
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(value)
            .then(function () {
              message.textContent = '클립보드에 복사되었습니다.';
            })
            .catch(function () {
              fallbackCopy();
            });
          return;
        }

        fallbackCopy();
      });
    })();
  </script>
</body>
</html>
